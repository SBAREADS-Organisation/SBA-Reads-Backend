name: Deploy to Production Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            # ── 1. Free disk space before doing anything ──────────────────────
            sudo apt-get clean -y
            sudo rm -rf /home/ubuntu/.npm /root/.npm /tmp/sbareads_* /tmp/sbareads_pdf_* /tmp/sbareads_chunk_* /tmp/sbareads_audio_*
            sudo rm -rf /var/www/html_backup_*
            sudo find /var/www/html/storage/logs -name "*.log" -size +50M -exec truncate -s 10M {} \; 2>/dev/null || true
            df -h /

            # ── 2. Install system dependencies if missing ─────────────────────
            if ! command -v redis-server &>/dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y redis-server
              sudo systemctl enable redis-server
              sudo systemctl start redis-server
            fi
            if ! command -v pdftotext &>/dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y poppler-utils
            fi

            # ── 3. Pull latest code ───────────────────────────────────────────
            cd /home/ubuntu/SBA-Reads-Backend
            git fetch origin
            git reset --hard origin/main

            # ── 4. Sync to production (exclude .env, git, vendor) ────────────
            sudo rsync -a \
              --exclude='.env' \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='storage/app/private/voice-samples/*.m4a' \
              --exclude='storage/app/private/voice-samples/*.mp3' \
              --exclude='storage/app/private/voice-samples/*.wav' \
              --exclude='storage/app/private/voice-samples/*.aac' \
              /home/ubuntu/SBA-Reads-Backend/ /var/www/html/

            cd /var/www/html

            # ── 5. Ensure storage dirs exist ──────────────────────────────────
            sudo mkdir -p bootstrap/cache \
              storage/framework/cache \
              storage/framework/sessions \
              storage/framework/views \
              storage/logs \
              storage/app/private/voice-samples

            # ── 6. Ensure Redis settings are in .env ──────────────────────────
            sudo grep -q "^QUEUE_CONNECTION=" /var/www/html/.env \
              && sudo sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=redis/' /var/www/html/.env \
              || echo "QUEUE_CONNECTION=redis" | sudo tee -a /var/www/html/.env
            sudo grep -q "^CACHE_STORE=" /var/www/html/.env \
              && sudo sed -i 's/^CACHE_STORE=.*/CACHE_STORE=redis/' /var/www/html/.env \
              || echo "CACHE_STORE=redis" | sudo tee -a /var/www/html/.env
            sudo grep -q "^REDIS_CLIENT=" /var/www/html/.env \
              && sudo sed -i 's/^REDIS_CLIENT=.*/REDIS_CLIENT=predis/' /var/www/html/.env \
              || echo "REDIS_CLIENT=predis" | sudo tee -a /var/www/html/.env

            # ── 7. Install PHP dependencies ───────────────────────────────────
            composer install --no-dev --optimize-autoloader --no-interaction

            # ── 8. Fix ownership ──────────────────────────────────────────────
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R u=rwX,go=rX /var/www/html
            sudo chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache

            # ── 9. Apply PHP upload limits ────────────────────────────────────
            sudo tee /etc/php/8.4/fpm/conf.d/99-uploads.ini > /dev/null <<'PHPEOF'
            upload_max_filesize = 210M
            post_max_size = 215M
            memory_limit = 512M
            max_execution_time = 300
            max_input_time = 300
            PHPEOF
            sudo tee /etc/php/8.4/cli/conf.d/99-uploads.ini > /dev/null <<'PHPEOF'
            upload_max_filesize = 210M
            post_max_size = 215M
            memory_limit = 512M
            max_execution_time = 300
            max_input_time = 300
            PHPEOF

            # Apply nginx upload limit and timeouts to the global http block
            if ! grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\\tclient_max_body_size 210M;' /etc/nginx/nginx.conf
            else
              sudo sed -i 's/client_max_body_size .*/client_max_body_size 210M;/' /etc/nginx/nginx.conf
            fi
            if ! grep -q "fastcgi_read_timeout" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\\tfastcgi_read_timeout 300;' /etc/nginx/nginx.conf
            else
              sudo sed -i 's/fastcgi_read_timeout .*/fastcgi_read_timeout 300;/' /etc/nginx/nginx.conf
            fi
            if ! grep -q "client_body_timeout" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a\\tclient_body_timeout 300;' /etc/nginx/nginx.conf
            else
              sudo sed -i 's/client_body_timeout .*/client_body_timeout 300;/' /etc/nginx/nginx.conf
            fi
            # Also patch the active site config so FastCGI timeout applies at location level
            for SITE_CONF in /etc/nginx/sites-enabled/*; do
              if grep -q "fastcgi_pass" "$SITE_CONF"; then
                if ! grep -q "fastcgi_read_timeout" "$SITE_CONF"; then
                  sudo sed -i '/fastcgi_pass/a\\t\tfastcgi_read_timeout 300;' "$SITE_CONF"
                else
                  sudo sed -i 's/fastcgi_read_timeout .*/fastcgi_read_timeout 300;/' "$SITE_CONF"
                fi
              fi
            done

            # ── 10. Clear and rebuild Laravel caches ──────────────────────────
            sudo -u www-data php artisan optimize:clear
            sudo -u www-data php artisan config:cache || echo "Config cache failed"
            sudo -u www-data php artisan route:cache  || echo "Route cache failed"
            sudo -u www-data php artisan view:cache   || echo "View cache failed"

            # ── 10. Run migrations ────────────────────────────────────────────
            sudo -u www-data php artisan migrate --force || echo "Migration failed"

            # ── 11. Install/update Horizon Supervisor config ──────────────────
            sudo tee /etc/supervisor/conf.d/sba-horizon.conf > /dev/null <<'SUPERVISOREOF'
            [program:sba-horizon]
            process_name=%(program_name)s
            command=php /var/www/html/artisan horizon
            autostart=true
            autorestart=true
            user=www-data
            redirect_stderr=true
            stdout_logfile=/var/www/html/storage/logs/horizon.log
            stopwaitsecs=3600
            SUPERVISOREOF

            sudo rm -f /etc/supervisor/conf.d/sba-queue.conf
            sudo rm -f /etc/supervisor/conf.d/sba-queue-default.conf
            sudo rm -f /etc/supervisor/conf.d/sba-queue-audio.conf

            sudo supervisorctl reread
            sudo supervisorctl update

            # ── 12. Restart services ──────────────────────────────────────────
            sudo systemctl reload nginx
            sudo systemctl restart php8.4-fpm
            sudo supervisorctl restart sba-horizon || sudo supervisorctl start sba-horizon

            # ── 13. Final disk check ──────────────────────────────────────────
            df -h /
            free -h

            echo "Deployment completed successfully!"
